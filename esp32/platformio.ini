; ESP32-S2 Mini firmware for the Open Sauce plotter.
;
;   pio run -t uploadfs   # build LittleFS image from ../web (via sync_web.py) and flash it
;   pio run -t upload     # build and flash the firmware
;   pio device monitor    # watch logs (shows the IP after WiFi joins)

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
board_build.filesystem = littlefs
upload_port = /dev/cu.usbmodem01
monitor_port = /dev/cu.usbmodem01
monitor_speed = 115200
lib_deps =
    esp32async/AsyncTCP@^3.3.2
    esp32async/ESPAsyncWebServer@^3.7.0
extra_scripts = pre:scripts/sync_web.py
